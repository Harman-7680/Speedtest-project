<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Speed Test Pro</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
      }

      .container {
        margin-top: 50px;
      }

      h1 {
        margin-bottom: 20px;
      }

      #speed {
        font-size: 60px;
        font-weight: bold;
      }

      .unit {
        font-size: 20px;
      }

      button {
        padding: 12px 30px;
        margin-top: 20px;
        border: none;
        border-radius: 30px;
        background: #22c55e;
        color: black;
        font-weight: bold;
        cursor: pointer;
      }

      .stats {
        margin-top: 30px;
      }

      canvas {
        margin-top: 30px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Speed Test</h1>

      <canvas id="gauge" width="300" height="150"></canvas>

      <div id="speed">0 <span class="unit">Mbps</span></div>

      <button onclick="startTest()">Start Test</button>

      <div class="stats">
        <p>Ping: <span id="ping">--</span> ms</p>
        <p>Upload: <span id="upload">--</span> Mbps</p>
      </div>
    </div>

    <script>
      const API = "https://affirmspace.com/api";
      let speedDisplay = document.getElementById("speed");

      // Draw gauge
      const canvas = document.getElementById("gauge");
      const ctx = canvas.getContext("2d");

      function drawGauge(speed) {
        ctx.clearRect(0, 0, 300, 150);

        ctx.beginPath();
        ctx.arc(150, 150, 100, Math.PI, 2 * Math.PI);
        ctx.strokeStyle = "#334155";
        ctx.lineWidth = 15;
        ctx.stroke();

        let angle = Math.PI + (speed / 100) * Math.PI;

        ctx.beginPath();
        ctx.arc(150, 150, 100, Math.PI, angle);
        ctx.strokeStyle = "#22c55e";
        ctx.lineWidth = 15;
        ctx.stroke();
      }

      // 🔹 Ping
      async function pingTest() {
        let start = Date.now();
        await fetch(API + "/ping");
        return Date.now() - start;
      }

      // 🔹 Download with animation
      async function downloadTest() {
        let start = Date.now();

        let reqs = [];
        for (let i = 0; i < 5; i++) {
          reqs.push(fetch(API + "/download"));
        }

        let responses = await Promise.all(reqs);

        let total = 0;

        for (let res of responses) {
          let reader = res.body.getReader();
          let received = 0;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            received += value.length;
            total += value.length;

            let elapsed = (Date.now() - start) / 1000;
            let speed = (total * 8) / (elapsed * 1000000);

            speedDisplay.innerHTML =
              speed.toFixed(2) + " <span class='unit'>Mbps</span>";
            drawGauge(speed);
          }
        }

        let end = Date.now();
        let time = (end - start) / 1000;

        return (total * 8) / (time * 1000000);
      }

      // 🔹 Upload
      async function uploadTest() {
        let data = new Blob([new ArrayBuffer(5 * 1024 * 1024)]);

        let start = Date.now();

        await fetch(API + "/upload", {
          method: "POST",
          body: data,
        });

        let end = Date.now();

        let time = (end - start) / 1000;
        return (data.size * 8) / (time * 1000000);
      }

      // START TEST
      async function startTest() {
        document.getElementById("upload").innerText = "--";
        document.getElementById("ping").innerText = "--";
        speedDisplay.innerHTML = "0 Mbps";

        drawGauge(0);

        let ping = await pingTest();
        document.getElementById("ping").innerText = ping;

        let download = await downloadTest();

        let upload = await uploadTest();
        document.getElementById("upload").innerText = upload.toFixed(2);
      }
    </script>
  </body>
</html>

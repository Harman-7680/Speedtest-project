<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Speed Test</title>

    <style>
      body {
        background: #0f172a;
        color: white;
        font-family: Arial;
        text-align: center;
      }

      #speed {
        font-size: 60px;
        margin-top: 20px;
      }

      button {
        padding: 12px 30px;
        border-radius: 30px;
        border: none;
        background: #22c55e;
        margin-top: 20px;
        cursor: pointer;
      }

      canvas {
        margin-top: 40px;
      }
    </style>
  </head>

  <body>
    <h1>Speed Test</h1>

    <canvas id="gauge" width="300" height="150"></canvas>

    <div id="speed">0 Mbps</div>

    <button onclick="startTest()">Start Test</button>

    <p>Ping: <span id="ping">--</span> ms</p>
    <p>Upload: <span id="upload">--</span> Mbps</p>

    <script>
      const API = "https://affirmspace.com/speedtest.php";
      const ctx = document.getElementById("gauge").getContext("2d");

      let currentSpeed = 0;

      // Smooth animation
      function smooth(newSpeed) {
        currentSpeed = currentSpeed * 0.7 + newSpeed * 0.3;
        return currentSpeed;
      }

      // Gauge
      function draw(speed) {
        ctx.clearRect(0, 0, 300, 150);

        ctx.beginPath();
        ctx.arc(150, 150, 100, Math.PI, 2 * Math.PI);
        ctx.strokeStyle = "#334155";
        ctx.lineWidth = 15;
        ctx.stroke();

        let capped = Math.min(speed, 100);
        let angle = Math.PI + (capped / 100) * Math.PI;

        ctx.beginPath();
        ctx.arc(150, 150, 100, Math.PI, angle);
        ctx.strokeStyle = "#22c55e";
        ctx.lineWidth = 15;
        ctx.stroke();
      }

      // Ping (avg)
      async function pingTest() {
        let arr = [];
        for (let i = 0; i < 5; i++) {
          let t = Date.now();
          await fetch(API + "?type=ping");
          arr.push(Date.now() - t);
        }
        return arr.reduce((a, b) => a + b) / arr.length;
      }

      // DOWNLOAD (10 sec real test)
      async function downloadTest() {
        let duration = 10000;
        let start = Date.now();
        let total = 0;

        while (Date.now() - start < duration) {
          let res = await Promise.all([
            fetch(API + "?type=download"),
            fetch(API + "?type=download"),
            fetch(API + "?type=download"),
            fetch(API + "?type=download"),
          ]);

          for (let r of res) {
            let blob = await r.blob();
            total += blob.size;
          }

          let time = (Date.now() - start) / 1000;
          let speed = (total * 8) / (time * 1000000);

          let smoothSpeed = smooth(speed);

          document.getElementById("speed").innerHTML =
            smoothSpeed.toFixed(2) + " Mbps";

          draw(smoothSpeed);
        }

        let totalTime = (Date.now() - start) / 1000;
        return (total * 8) / (totalTime * 1000000);
      }

      // UPLOAD (10 sec)
      async function uploadTest() {
        let duration = 8000;
        let start = Date.now();
        let total = 0;

        while (Date.now() - start < duration) {
          let data = new Blob([new ArrayBuffer(1 * 1024 * 1024)]);

          await fetch(API + "?type=upload", {
            method: "POST",
            body: data,
          });

          total += data.size;
        }

        let totalTime = (Date.now() - start) / 1000;
        return (total * 8) / (totalTime * 1000000);
      }

      // MAIN FLOW (Ookla style)
      async function startTest() {
        document.getElementById("speed").innerHTML = "0 Mbps";
        draw(0);

        // Ping first
        let ping = await pingTest();
        document.getElementById("ping").innerText = ping.toFixed(0);

        // Download
        let down = await downloadTest();

        // Upload
        let up = await uploadTest();
        document.getElementById("upload").innerText = up.toFixed(2);
      }
    </script>
  </body>
</html>

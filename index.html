<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Speed Test</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
      }

      .container {
        margin-top: 40px;
      }

      h1 {
        margin-bottom: 10px;
      }

      #phase {
        font-size: 18px;
        color: #94a3b8;
      }

      #timer {
        font-size: 22px;
        margin-top: 10px;
        color: #22c55e;
      }

      #speed {
        font-size: 60px;
        margin-top: 20px;
      }

      button {
        padding: 12px 30px;
        border: none;
        border-radius: 30px;
        background: #22c55e;
        color: black;
        margin-top: 20px;
        cursor: pointer;
        font-weight: bold;
      }

      .stats {
        margin-top: 20px;
      }

      canvas {
        margin-top: 30px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Speed Test</h1>

      <div id="phase">Ready</div>
      <div id="timer">0s</div>

      <canvas id="gauge" width="300" height="150"></canvas>

      <div id="speed">0 Mbps</div>

      <button onclick="startTest()">Start Test</button>

      <div class="stats">
        <p>Ping: <span id="ping">--</span> ms</p>
        <p>Download: <span id="download">--</span> Mbps</p>
        <p>Upload: <span id="upload">--</span> Mbps</p>
      </div>
    </div>

    <script>
      const API = "https://affirmspace.com/speedtest.php";

      const ctx = document.getElementById("gauge").getContext("2d");

      let currentSpeed = 0;

      // Smooth
      function smooth(newSpeed) {
        currentSpeed = currentSpeed * 0.7 + newSpeed * 0.3;
        return currentSpeed;
      }

      // Gauge
      function draw(speed) {
        ctx.clearRect(0, 0, 300, 150);

        ctx.beginPath();
        ctx.arc(150, 150, 100, Math.PI, 2 * Math.PI);
        ctx.strokeStyle = "#334155";
        ctx.lineWidth = 15;
        ctx.stroke();

        let capped = Math.min(speed, 100);
        let angle = Math.PI + (capped / 100) * Math.PI;

        ctx.beginPath();
        ctx.arc(150, 150, 100, Math.PI, angle);
        ctx.strokeStyle = "#22c55e";
        ctx.lineWidth = 15;
        ctx.stroke();
      }

      // Timer UI
      function startTimer(duration, label) {
        let timerEl = document.getElementById("timer");
        let phaseEl = document.getElementById("phase");

        phaseEl.innerText = label;

        return new Promise((resolve) => {
          let time = duration;
          let interval = setInterval(() => {
            timerEl.innerText = time + "s";
            time--;

            if (time < 0) {
              clearInterval(interval);
              resolve();
            }
          }, 1000);
        });
      }

      // Ping
      async function pingTest() {
        let arr = [];
        for (let i = 0; i < 5; i++) {
          let t = Date.now();
          await fetch(API + "?type=ping");
          arr.push(Date.now() - t);
        }
        return arr.reduce((a, b) => a + b) / arr.length;
      }

      // Download
      async function downloadTest() {
        let duration = 10000;
        let start = Date.now();
        let total = 0;

        while (Date.now() - start < duration) {
          let res = await Promise.all([
            fetch(API + "?type=download"),
            fetch(API + "?type=download"),
            fetch(API + "?type=download"),
            fetch(API + "?type=download"),
          ]);

          for (let r of res) {
            let blob = await r.blob();
            total += blob.size;
          }

          let time = (Date.now() - start) / 1000;
          let speed = (total * 8) / (time * 1000000);

          let s = smooth(speed);

          document.getElementById("speed").innerText = s.toFixed(2) + " Mbps";
          draw(s);
        }

        let totalTime = (Date.now() - start) / 1000;
        return (total * 8) / (totalTime * 1000000);
      }

      // Upload
      async function uploadTest() {
        let duration = 8000;
        let start = Date.now();
        let total = 0;

        while (Date.now() - start < duration) {
          let data = new Blob([new ArrayBuffer(1 * 1024 * 1024)]);

          await fetch(API + "?type=upload", {
            method: "POST",
            body: data,
          });

          total += data.size;

          let time = (Date.now() - start) / 1000;
          let speed = (total * 8) / (time * 1000000);

          let s = smooth(speed);

          document.getElementById("speed").innerText = s.toFixed(2) + " Mbps";
          draw(s);
        }

        let totalTime = (Date.now() - start) / 1000;
        return (total * 8) / (totalTime * 1000000);
      }

      // MAIN FLOW
      async function startTest() {
        document.getElementById("speed").innerText = "0 Mbps";
        draw(0);

        // Ping
        document.getElementById("phase").innerText = "Testing Ping...";
        let ping = await pingTest();
        document.getElementById("ping").innerText = ping.toFixed(0);

        // Download
        await startTimer(10, "Downloading...");
        let down = await downloadTest();
        document.getElementById("download").innerText = down.toFixed(2);

        // Upload
        await startTimer(8, "Uploading...");
        let up = await uploadTest();
        document.getElementById("upload").innerText = up.toFixed(2);

        document.getElementById("phase").innerText = "Completed";
      }
    </script>
  </body>
</html>
